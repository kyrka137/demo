# 1. Kapcsolódás a memóriában futó H2 adatbázishoz (nem kell hozzá semmilyen szerver)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. A Hibernate (JPA) beállítása H2 dialektusra
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 3. A legfontosabb: A Spring minden teszt indulásakor automatikusan hozza létre a táblákat a memóriában, a végén pedig dobja el!
spring.jpa.hibernate.ddl-auto=create-drop